name: Deploy horarios

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: deploy-horarios
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 20
    if: github.ref_name == 'master' || github.ref_name == 'main'
    steps:
      - name: Validar entorno del runner
        shell: bash
        run: |
          set -eu
          [ -d /opt/horarios/app ] || { echo "No existe /opt/horarios/app"; exit 1; }
          command -v git >/dev/null 2>&1 || { echo "Git no esta instalado en el runner"; exit 1; }
          command -v docker >/dev/null 2>&1 || { echo "Docker no esta instalado en el runner"; exit 1; }
          docker compose version >/dev/null 2>&1 || { echo "Docker Compose plugin no esta disponible"; exit 1; }

      - name: Ejecutar despliegue local
        shell: bash
        run: |
          cd /opt/horarios/app
          chmod +x scripts/servidor_actualizar.sh
          ./scripts/servidor_actualizar.sh ${{ github.ref_name }}
