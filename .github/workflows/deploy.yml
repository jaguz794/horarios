name: Deploy horarios

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref_name == 'master' || github.ref_name == 'main'
    steps:
      - name: Ejecutar despliegue remoto por SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd /opt/horarios/app
            chmod +x scripts/servidor_actualizar.sh
            ./scripts/servidor_actualizar.sh ${{ github.ref_name }}
